name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --dev
      - name: Install Playwright-Browser (tests/visual Pixel-Diff)
        run: uv run playwright install --with-deps chromium
      - name: Run tests
        run: |
          uv run pytest \
            --ignore=tests/tdd/ \
            --ignore=tests/red/ \
            --ignore=tests/refactor/ \
            --ignore=tests/unit/test_elevation_analysis.py \
            --ignore=tests/unit/test_etappen_config.py \
            --ignore=tests/unit/test_gpx_parser.py \
            --ignore=tests/unit/test_gpx_import_in_trip_dialog.py \
            --ignore=tests/unit/test_gpx_upload_page.py \
            --ignore=tests/unit/test_hybrid_segmentation.py \
            --ignore=tests/unit/test_segment_builder.py \
            -v

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run Go tests
        run: go test ./...

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm test

  svelte-check:
    # Baseline-Gate (Issue #1018): darf nur "nicht schlechter werden".
    # Hart auf 0 Fehler erst nach Frontend-Bereinigung (Roadmap Phase 3.2).
    # Bei Verbesserung: Baseline-Werte hier absenken.
    runs-on: ubuntu-latest
    env:
      BASELINE_ERRORS: 40
      BASELINE_WARNINGS: 159
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: svelte-check gegen Baseline
        run: |
          OUT=$(npx svelte-check --tsconfig ./tsconfig.json --output machine 2>&1) || true
          SUMMARY=$(echo "$OUT" | grep ' COMPLETED ' | tail -1)
          echo "$SUMMARY"
          [ -n "$SUMMARY" ] || { echo "FEHLER: svelte-check lieferte keine COMPLETED-Zeile."; echo "$OUT" | tail -20; exit 1; }
          ERRORS=$(echo "$SUMMARY" | awk '{for(i=1;i<=NF;i++) if($i=="ERRORS") print $(i-1)}')
          WARNINGS=$(echo "$SUMMARY" | awk '{for(i=1;i<=NF;i++) if($i=="WARNINGS") print $(i-1)}')
          echo "Ist: $ERRORS Fehler / $WARNINGS Warnings — Baseline: $BASELINE_ERRORS / $BASELINE_WARNINGS"
          FAIL=0
          [ "$ERRORS" -le "$BASELINE_ERRORS" ] || { echo "FEHLER: $ERRORS Fehler > Baseline $BASELINE_ERRORS"; FAIL=1; }
          [ "$WARNINGS" -le "$BASELINE_WARNINGS" ] || { echo "FEHLER: $WARNINGS Warnings > Baseline $BASELINE_WARNINGS"; FAIL=1; }
          if [ "$ERRORS" -lt "$BASELINE_ERRORS" ] || [ "$WARNINGS" -lt "$BASELINE_WARNINGS" ]; then
            echo "HINWEIS: Besser als Baseline — BASELINE_ERRORS/BASELINE_WARNINGS in ci.yml absenken."
          fi
          exit $FAIL

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --dev
      - name: Run ruff check
        run: uv run ruff check src/ tests/

  deploy:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Warten bis Staging aktuellen Commit hat
        run: |
          EXPECTED="${{ github.sha }}"
          BASE="https://staging.gregor20.henemm.com"
          echo "Erwarte Commit ${EXPECTED:0:7} auf Staging..."
          for i in $(seq 1 12); do
            STAGING=$(curl -s "$BASE/api/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('commit','')[:7])" 2>/dev/null || echo "")
            echo "Versuch $i/12: Staging=$STAGING Erwartet=${EXPECTED:0:7}"
            [ "$STAGING" = "${EXPECTED:0:7}" ] && echo "Staging aktuell." && break
            [ $i -eq 12 ] && echo "FEHLER: Staging nach 6 Min nicht aktuell." && exit 1
            sleep 30
          done

      - name: Smoke-Test Staging
        run: |
          BASE="https://staging.gregor20.henemm.com"
          # Root liegt hinter Basic-Auth (#1030) — mit Creds prüfen, damit der
          # Frontend-Service selbst getestet wird, nicht nur die Auth-Schicht.
          ROOT=$(curl -s -o /dev/null -w "%{http_code}" -u "${{ secrets.STAGING_BASIC_AUTH }}" "$BASE/")
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/health")
          echo "ROOT=$ROOT HEALTH=$HEALTH"
          { [ "$ROOT" = "200" ] || [ "$ROOT" = "302" ]; } || { echo "ROOT $ROOT != 200/302"; exit 1; }
          [ "$HEALTH" = "200" ] || { echo "HEALTH $HEALTH != 200"; exit 1; }
          echo "Staging Smoke: OK"

      - name: Staging-Verdict schreiben (CI smoke)
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          cat > /tmp/ci_e2e_findings.json << 'EOF'
          [{"ac":"ROOT","status":"PASS","url":"/","evidence":"HTTP 200/302"},{"ac":"HEALTH","status":"PASS","url":"/api/health","evidence":"HTTP 200"}]
          EOF
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            /tmp/ci_e2e_findings.json \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/ci_e2e_findings.json
          # Issue #1031 Root Cause: staging_gate verlangt bei Telegram-berührenden
          # Changes einen Live-Test (#686 AC-5) — dafür müssen die Staging-Bot-Creds
          # (GZ_TELEGRAM_TEST_CHAT_ID etc.) aus der Server-seitigen Staging-.env
          # gesourct sein, sonst verweigert das Gate das Verdict und der Deploy
          # fällt auf eine veraltete Singleton-Attestation zurück.
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /home/hem/gregor_zwanzig && git fetch origin 2>/dev/null && git reset --hard origin/main && set -a && . /home/hem/gregor_zwanzig_staging/.env && set +a && GZ_TELEGRAM_LIVE=1 python3 .claude/hooks/staging_gate.py --write-verdict 'VERIFIED: CI smoke test (ROOT+HEALTH) passed' --findings-json /tmp/ci_e2e_findings.json; rm -f /tmp/ci_e2e_findings.json"
          rm -f /tmp/deploy_key /tmp/ci_e2e_findings.json

      - name: Deploy zu Produktion via SSH
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash /home/hem/henemm-infra/scripts/deploy-gregor-prod.sh"
          EXIT=$?
          rm -f /tmp/deploy_key
          exit $EXIT

      - name: Telegram — Deploy erfolgreich (HENEMM Server)
        if: success()
        run: |
          SHA="${{ github.sha }}"
          MSG="deployed: ${SHA:0:7} ${{ github.event.head_commit.message }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.HENEMM_DEPLOY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.HENEMM_DEPLOY_CHAT_ID }}\",\"text\":\"gregor20 $MSG\"}" \
            > /dev/null

      - name: Telegram — Deploy fehlgeschlagen (HENEMM Server)
        if: failure()
        run: |
          SHA="${{ github.sha }}"
          RUN="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="FEHLGESCHLAGEN: ${SHA:0:7} ${{ github.event.head_commit.message }} | $RUN"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.HENEMM_DEPLOY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.HENEMM_DEPLOY_CHAT_ID }}\",\"text\":\"gregor20 $MSG\"}" \
            > /dev/null
