<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Gregor 20 — Komponenten</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { background: #f0eee9; height: 100%; }
  #root { min-height: 100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Atomic-Design-Schichten · Lade-Reihenfolge ist verbindlich -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mock-data.jsx"></script>
<script type="text/babel" src="mock-locations.jsx"></script>
<script type="text/babel" src="brand-kit.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="molecules.jsx"></script>
<script type="text/babel" src="organisms.jsx"></script>
<script type="text/babel" src="mobile-shell.jsx"></script>

<!-- Showcases -->
<script type="text/babel" src="screen-channel-preview-redesign.jsx"></script>
<script type="text/babel" src="screen-design-system.jsx"></script>
<script type="text/babel" src="screen-design-system-mobile.jsx"></script>

<script type="text/babel">
  const PHONE_W = 387; // 375 + 12 (Bezel 6 px je Seite)

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="intro"
          title="Komponenten · Atomic Design"
          subtitle="Single-Source-of-Truth. Brand → Atoms → Molecules → Organisms → Templates. Wenn etwas hier nicht steht, ist es noch keine Komponente — sondern Inline-Code in einer Page.">
          <DCArtboard id="legend" label="Legende · Atomic-Schichten" width={520} height={780}>
            <LegendCard/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="desktop"
          title="01 · Desktop-Komponenten"
          subtitle="Brand · Typografie · Farben · Atoms · Molecules · Organisms · Templates · Voice. Quelle: screen-design-system.jsx (geladen aus brand-kit + atoms + molecules + organisms).">
          <DCArtboard id="ds-desktop" label="Design-System · Desktop" width={1320} height={3600}>
            <ScreenDesignSystem/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="mobile"
          title="02 · Mobile-Komponenten"
          subtitle="Touch-Atoms aus mobile-shell.jsx (MBtn, MInput, MField, MSwitch, MTab, IconBtn) und die Mobile-spezifischen Tokens (Density, Hit-Targets, Safe-Areas).">
          <DCArtboard id="ds-mobile" label="Design-System · Mobile" width={PHONE_W} height={1130}>
            <ScreenDesignSystemMobile/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="channel-preview"
          title="03 · Kanal-Vorschau · Organism (Issue #496)"
          subtitle="Der Vorschau-Organism <ChannelPreviewRedesign> als Single-Source — derselbe, der im Wetter-Metriken-Tab des Trip-Hubs steckt. Hier isoliert je Kanal + Tech-Lead-Begründung (A+B statt vier Kacheln). Quelle: screen-channel-preview-redesign.jsx.">
          <DCArtboard id="cp-rationale" label="Begründung · A+B statt vier Kacheln" width={980} height={760}>
            <ChannelPreviewRationale/>
          </DCArtboard>
          <DCArtboard id="cp-signal" label="Signal aktiv · 4 Spalten rutschen in Detail" width={1140} height={620}>
            <div style={{ padding: 24, background: "var(--g-paper)", minHeight: "100%" }}>
              <ChannelPreviewRedesign primary={CP_DEMO_PRIMARY} secondary={CP_DEMO_SECONDARY} viewport="desktop" initialChannel="signal"/>
            </div>
          </DCArtboard>
          <DCArtboard id="cp-email" label="Email aktiv · Desktop-/iPhone-Mail umschaltbar (∞, am Handy gestapelt)" width={1140} height={680}>
            <div style={{ padding: 24, background: "var(--g-paper)", minHeight: "100%" }}>
              <ChannelPreviewRedesign primary={CP_DEMO_PRIMARY} secondary={CP_DEMO_SECONDARY} viewport="desktop" initialChannel="email"/>
            </div>
          </DCArtboard>
          <DCArtboard id="cp-sms" label="SMS aktiv · Token-Code · Metriken ohne Code fallen weg" width={1140} height={680}>
            <div style={{ padding: 24, background: "var(--g-paper)", minHeight: "100%" }}>
              <ChannelPreviewRedesign primary={CP_DEMO_PRIMARY} secondary={CP_DEMO_SECONDARY} viewport="desktop" initialChannel="sms"/>
            </div>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  function LegendCard() {
    return (
      <div style={{
        padding: 28, background: "var(--g-card)", height: "100%",
        overflow: "auto", border: "1px solid var(--g-rule)",
        borderRadius: 6, fontFamily: "var(--g-font-sans)",
      }}>
        <div className="mono" style={{ fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--g-ink-3)", marginBottom: 8 }}>
          Atomic Design · Schichten
        </div>
        <h1 style={{ fontSize: 26, fontWeight: 600, letterSpacing: "-0.02em", margin: "0 0 14px" }}>
          Was lebt wo
        </h1>
        <div style={{ fontSize: 13.5, color: "var(--g-ink-2)", lineHeight: 1.6, marginBottom: 18 }}>
          Disziplin: erst die Schicht prüfen, dann verwenden. Existiert das Element noch nicht → in der passenden Schicht ergänzen, nicht inline duplizieren.
        </div>

        <LegendRow
          tag="Brand"
          file="brand-kit.jsx"
          examples="BrandWordmark · BrandIcon · BrandSidebar · BrandUserBadge · BrandShell"
          desc="Markenwahrheit. Konflikt-Sieger über allen anderen Schichten."
        />
        <LegendRow
          tag="Atoms"
          file="atoms.jsx"
          examples="Btn · Pill · Input · Switch · Card · Eyebrow · KV · WIcon · Dot · SectionH"
          desc="Kleinste UI-Bausteine, ohne Domain-Wissen."
        />
        <LegendRow
          tag="Mobile-Atoms"
          file="mobile-shell.jsx"
          examples="MBtn · MInput · MField · MSwitch · MTab · IconBtn · MIcon · PhoneFrame · TopAppBar · BottomNav · Drawer · Sheet · Toast"
          desc="Touch-Geometrie (≥ 44 px Hit-Targets) statt Maus-Geometrie."
        />
        <LegendRow
          tag="Molecules"
          file="molecules.jsx"
          examples="Field · DetailRow · StagePill · ChannelRow · ChannelChip · BriefingTimelineRow · BriefingScheduleRow · ThresholdRow · Stat · AlertRow"
          desc="2+ Atome mit eigener Semantik. Desktop und Mobile teilen dieselben Molecules über dense/compact/last-Props."
        />
        <LegendRow
          tag="Organisms"
          file="organisms.jsx"
          examples="PresetRail · MetricGroup · MetricEditorRow · MetricCheckbox · MetricOffShelf · ChannelPreviewBlock · ChannelPreviewCard · ChannelLimitChip · MetricsEditorContextBar · WeatherMetricsTab"
          desc="Domain-spezifische Page-Sektionen aus mehreren Molecules. Eine Organism kann eine ganze Sektion einer Page sein."
        />
        <LegendRow
          tag="Templates"
          file="brand-kit.jsx · mobile-shell.jsx"
          examples="BrandShell · MobileShell · PhoneFrame"
          desc="Layout-Skelette: definieren WO etwas liegt, nicht WAS."
        />

        <div style={{
          marginTop: 18, padding: "12px 14px",
          background: "var(--g-card-alt)", border: "1px solid var(--g-rule-soft)",
          borderRadius: 4, fontSize: 12, color: "var(--g-ink-2)", lineHeight: 1.55,
        }}>
          <div className="mono" style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--g-accent)", fontWeight: 600, marginBottom: 4 }}>
            Disziplin (CLAUDE.md)
          </div>
          Vor jeder neuen UI-Arbeit: alle Schichten vollständig lesen, vorhandene Komponente verwenden, sonst dort hinzufügen. Niemals Inline-Variante. Bei Variante: Prop oder bewusste Ausnahme — User fragen.
        </div>
      </div>
    );
  }

  function LegendRow({ tag, file, examples, desc }) {
    return (
      <div style={{
        display: "grid", gridTemplateColumns: "120px 1fr", gap: 14,
        padding: "12px 0", borderTop: "1px solid var(--g-rule-soft)",
      }}>
        <div>
          <div className="mono" style={{
            fontSize: 11, color: "var(--g-accent)",
            textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600,
          }}>{tag}</div>
          <div className="mono" style={{ fontSize: 10, color: "var(--g-ink-4)", marginTop: 3 }}>
            {file}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 12.5, color: "var(--g-ink-2)", lineHeight: 1.55 }}>{desc}</div>
          <div className="mono" style={{ fontSize: 10.5, color: "var(--g-ink-3)", marginTop: 6, lineHeight: 1.55 }}>
            {examples}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
